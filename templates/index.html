<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Factory - VPS EPYC Power</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; }
        .progress { height: 25px; border-radius: 15px; }
        .status-badge { font-size: 1.2em; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass p-5 text-center text-white mb-5">
                    <h1><i class="fas fa-subtitles text-warning"></i> SRT Factory</h1>
                    <p class="lead">EPYC 64-Core VPS • Whisper AI • Bahasa Indonesia</p>
                    <div class="row text-start">
                        <div class="col-md-4"><i class="fas fa-microphone"></i> Auto Transcribe</div>
                        <div class="col-md-4"><i class="fas fa-bolt"></i> ⚡ Super Cepat</div>
                        <div class="col-md-4"><i class="fas fa-infinity"></i> Unlimited</div>
                    </div>
                </div>

                <!-- Upload Form -->
                <div class="glass p-5 mb-4">
                    <h3><i class="fas fa-cloud-upload-alt"></i> Upload Video</h3>
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" class="form-control form-control-lg" id="fileInput" accept="video/*" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg w-100">
                            <i class="fas fa-magic"></i> Generate SRT
                        </button>
                    </form>
                </div>

                <!-- Progress -->
                <div id="progressSection" class="glass p-5" style="display:none;">
                    <h4 id="taskTitle">Processing...</h4>
                    <div class="progress mb-3" id="progressBar">
                        <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    <div id="statusText" class="status-badge bg-secondary w-100 mb-2"></div>
                    <div class="row">
                        <div class="col">
                            <a id="downloadBtn" class="btn btn-success w-100" style="display:none;">
                                <i class="fas fa-download"></i> Download SRT
                            </a>
                        </div>
                        <div class="col">
                            <button id="newTaskBtn" class="btn btn-outline-light w-100" style="display:none;">
                                <i class="fas fa-plus"></i> Video Baru
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentTaskId = null;

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                document.querySelector('.glass p').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
                
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.task_id) {
                    currentTaskId = result.task_id;
                    document.getElementById('taskTitle').textContent = `Processing: ${fileInput.files[0].name}`;
                    document.getElementById('progressSection').style.display = 'block';
                    pollStatus(currentTaskId);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/status/${taskId}`);
                    const task = await response.json();
                    
                    document.querySelector('.progress-bar').style.width = task.progress + '%';
                    document.getElementById('statusText').textContent = getStatusText(task.status);
                    document.getElementById('statusText').className = `status-badge ${getStatusClass(task.status)} w-100 mb-2`;
                    
                    if (task.status === 'completed') {
                        document.getElementById('downloadBtn').style.display = 'block';
                        document.getElementById('downloadBtn').onclick = () => window.location.href = `/download/${taskId}`;
                        document.getElementById('newTaskBtn').style.display = 'block';
                        clearInterval(interval);
                    } else if (task.status === 'error') {
                        document.getElementById('statusText').textContent = 'Error: ' + task.error;
                        clearInterval(interval);
                    }
                } catch (error) {
                    console.error('Poll error:', error);
                }
            }, 1000);
        }

        function getStatusText(status) {
            const texts = {
                'queued': '📋 Antri',
                'processing': '⚙️ Processing...',
                'completed': '✅ Selesai!',
                'error': '❌ Error'
            };
            return texts[status] || status;
        }

        function getStatusClass(status) {
            const classes = {
                'queued': 'bg-info',
                'processing': 'bg-warning',
                'completed': 'bg-success',
                'error': 'bg-danger'
            };
            return classes[status] || 'bg-secondary';
        }
    </script>
</body>
</html>
